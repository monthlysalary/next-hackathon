
<div style="background: #f5ede8; min-height: 820px; display: flex; align-items: center; justify-content: center; padding: 2rem 0;">
  <div style="background: #fdf6f0; width: 340px; border-radius: 40px; padding: 2rem 1.5rem 1.75rem; border: 1px solid #ecddd6; display: flex; flex-direction: column; gap: 0;">

    <h1 style="font-size: 28px; font-weight: 800; color: #1a1a1a; margin: 0 0 6px; letter-spacing: -0.5px;">Allergies</h1>
    <p style="font-size: 14px; color: #999; margin: 0 0 1.5rem; line-height: 1.5;">Tap to select. Your health is our priority.</p>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1.5rem;">

      <!-- Nuts -->
      <div onclick="toggle(this)" style="background: white; border-radius: 18px; border: 1.5px solid #ecddd6; padding: 1.25rem 1rem; display: flex; flex-direction: column; align-items: center; gap: 12px; cursor: pointer;">
        <div style="width: 56px; height: 56px; border-radius: 50%; background: #fff5ef; display: flex; align-items: center; justify-content: center; overflow: hidden;">
          <img src="images/nuts.png" alt="Nuts" style="width: 50px; height: 50px; object-fit: cover; border-radius: 50%;">
        </div>
        <span style="font-size: 14px; font-weight: 600; color: #1a1a1a;">Nuts</span>
      </div>

      <!-- Shellfish -->
      <div onclick="toggle(this)" style="background: white; border-radius: 18px; border: 1.5px solid #ecddd6; padding: 1.25rem 1rem; display: flex; flex-direction: column; align-items: center; gap: 12px; cursor: pointer;">
        <div style="width: 56px; height: 56px; border-radius: 50%; background: #fff5ef; display: flex; align-items: center; justify-content: center; overflow: hidden;">
          <img src="images/shellfish.png" alt="Shellfish" style="width: 50px; height: 50px; object-fit: cover; border-radius: 50%;">
        </div>
        <span style="font-size: 14px; font-weight: 600; color: #1a1a1a;">Shellfish</span>
      </div>

      <!-- Soy -->
      <div onclick="toggle(this)" style="background: white; border-radius: 18px; border: 1.5px solid #ecddd6; padding: 1.25rem 1rem; display: flex; flex-direction: column; align-items: center; gap: 12px; cursor: pointer;">
        <div style="width: 56px; height: 56px; border-radius: 50%; background: #fff8e8; display: flex; align-items: center; justify-content: center; overflow: hidden;">
          <img src="images/soy.png" alt="Soy" style="width: 50px; height: 50px; object-fit: cover; border-radius: 50%;">
        </div>
        <span style="font-size: 14px; font-weight: 600; color: #1a1a1a;">Soy</span>
      </div>

      <!-- Eggs -->
      <div onclick="toggle(this)" style="background: white; border-radius: 18px; border: 1.5px solid #ecddd6; padding: 1.25rem 1rem; display: flex; flex-direction: column; align-items: center; gap: 12px; cursor: pointer;">
        <div style="width: 56px; height: 56px; border-radius: 50%; background: #fff8e8; display: flex; align-items: center; justify-content: center; overflow: hidden;">
          <img src="images/eggs.png" alt="Eggs" style="width: 50px; height: 50px; object-fit: cover; border-radius: 50%;">
        </div>
        <span style="font-size: 14px; font-weight: 600; color: #1a1a1a;">Eggs</span>
      </div>

    </div>

    <!-- Other Allergies -->
    <p style="font-size: 11px; font-weight: 700; color: #bbb; letter-spacing: 1.2px; margin: 0 0 10px; text-transform: uppercase;">Other Allergies</p>

    <div id="custom-allergies" style="display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px;"></div>

    <div style="display: flex; gap: 10px; margin-bottom: 1.75rem;">
      <input id="allergy-input" type="text" placeholder="Add another..." onkeydown="if(event.key==='Enter'){addAllergy()}" style="flex: 1; background: white; border: 1px solid #ecddd6; border-radius: 14px; padding: 0 16px; height: 50px; font-size: 14px; color: #1a1a1a; outline: none;"/>
      <button onclick="addAllergy()"
        style="
          width: 50px;
          height: 50px;
          background: #F28155;
          border: none;
          border-radius: 14px;
          display: flex;
          align-items: center;
          justify-content: center;
          cursor: pointer;
          flex-shrink: 0;
          color: white;
          font-size: 28px;
          font-weight: 300;
        ">
        +
      </button>
    </div>

    <button style="width: 100%; background: #F28155; color: white; border: none; border-radius: 16px; height: 54px; font-size: 16px; font-weight: 700; cursor: pointer; margin-bottom: 1rem;">
      Complete Setup
    </button>

    <p style="text-align: center; font-size: 14px; color: #bbb; margin: 0; cursor: pointer;">Go Back</p>

  </div>
</div>

<script>
function toggle(el) {
  const isSelected = el.style.borderColor === 'rgb(242, 129, 85)';
  el.style.borderColor = isSelected ? '#ecddd6' : '#F28155';
}

function addAllergy() {
  const input = document.getElementById('allergy-input');
  const value = input.value.trim();
  if (!value) return;

  const container = document.getElementById('custom-allergies');

  const tag = document.createElement('div');
  tag.style.cssText = 'display: inline-flex; align-items: center; gap: 6px; background: #fff5ef; border: 1.5px solid #F28155; border-radius: 20px; padding: 8px 14px; font-size: 13px; font-weight: 600; color: #1a1a1a;';
  tag.textContent = value;

  const removeBtn = document.createElement('span');
  removeBtn.textContent = '×';
  removeBtn.style.cssText = 'cursor: pointer; color: #F28155; font-size: 16px; font-weight: 700; margin-left: 4px;';
  removeBtn.onclick = function() { tag.remove(); };
  tag.appendChild(removeBtn);

  container.appendChild(tag);
  input.value = '';
  input.focus();
}
</script>
